<html lang="en" style="height: 100%">
<head>
  <meta charset="utf-8">

<body style="height: 100%; margin: 0">
  <div id="container" style="height: 100%"></div>

  
  <script type="text/javascript" src="https://fastly.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  
  <script type="text/javascript">
    var dom = document.getElementById('container');
    var myChart = echarts.init(dom, null, {
      renderer: 'canvas',
      useDirtyRect: false
    });
    var app = {};
    
    var option;

const anos = ['2016', '2017', '2018', '2019', '2020', '2021', '2022', '2023', '2024', '2025'];
const chuvaTotal = [295.0, 211.5, 764.8, 497.9, 591.3, 388.5, 938.6, 465.6, 378.2, 528.5];

option = {
  title: {
    text: 'Volume de chuva acumulada por ano (2016 a 2025)\nFazenda Carnaúba - Taperoá - PB',
    left: 'center',
    top: '5%'
  },
  
  tooltip: {
    trigger: 'axis',
    axisPointer: {
      type: 'shadow'
    },
    valueFormatter: (value) => value + ' mm'
  },

  grid: {
    top: '20%',
    bottom: '15%'
  },

  dataZoom: [
    {
      type: 'slider',
      show: true,
      xAxisIndex: [0],
      start: 0,
      end: 100
    },
    {
      type: 'inside',
      xAxisIndex: [0],
      start: 0,
      end: 100
    }
  ],

  xAxis: {
    type: 'category',
    data: anos,
    name: 'Ano',
    nameLocation: 'middle',
    nameGap: 30
  },

  yAxis: {
    type: 'value',
    name: 'Volume (mm)',
    alignTicks: true
  },

  series: [
    {
      name: 'Chuva',
      data: chuvaTotal,
      type: 'bar', 
      label: {
        show: true,
        position: 'top',
        formatter: '{c}'
      },
      itemStyle: {
        color: '#5470C6',
        borderRadius: [4, 4, 0, 0]
      }
    }
  ]
};

    if (option && typeof option === 'object') {
      myChart.setOption(option);
    }

    window.addEventListener('resize', myChart.resize);
  </script>
</body>
