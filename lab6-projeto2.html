  <script type="text/javascript" src="https://fastly.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  
  <script type="text/javascript">
    var dom = document.getElementById('container');
    var myChart = echarts.init(dom, null, {
      renderer: 'canvas',
      useDirtyRect: false
    });
    var app = {};
    
    var option;

const anos = ['2016', '2017', '2018', '2019', '2020', '2021', '2022', '2023', '2024', '2025'];
const variacoes = [-91.7, -83.5, 553.3, -266.9, 93.4, -202.8, 550.1, -473.0, -87.4, 150.3];

option = {
  title: {
    text: 'Variação da chuva acumulada por ano (2016 a 2025)\nFazenda Carnaúba - Taperoá - PB',
    left: 'center',
    top: '2%',
    textStyle: {
      fontSize: 16
    }
  },
  
  tooltip: {
    trigger: 'axis',
    axisPointer: {
      type: 'shadow' 
    },
    formatter: function (params) {
      const val = params[0].value;
      const sinal = val > 0 ? '+' : '';
      return `<b>Ano: ${params[0].name}</b><br/>
              Variação: <span style="font-weight:bold;">${sinal}${val.toFixed(1)} mm</span>`;
    }
  },

  grid: {
    top: '18%',
    bottom: '15%',
    left: '10%',
    right: '12%'
  },

  xAxis: {
    type: 'category',
    data: anos,
    name: 'Ano',
    nameLocation: 'middle',
    nameGap: 30,
    axisTick: { show: false }
  },

  yAxis: {
    type: 'value',
    name: 'Variação (mm)',
    splitLine: {
      lineStyle: {
        type: 'dashed' 
      }
    }
  },

  dataZoom: [
    {
      type: 'slider', 
      show: true,
      xAxisIndex: [0],
      start: 0,
      end: 100,
      bottom: '2%'
    },
    {
      type: 'slider', 
      show: true,
      yAxisIndex: [0],
      left: '92%',
      start: 0,
      end: 100
    },
    {
      type: 'inside', 
      xAxisIndex: [0]
    }
  ],

  series: [
    {
      name: 'Variação Anual',
      type: 'bar',
      data: variacoes.map(val => {
        return {
          value: val,
          itemStyle: {
            color: val >= 0 ? '#3ba272' : '#ee6666', 
            borderRadius: val >= 0 ? [4, 4, 0, 0] : [0, 0, 4, 4]
          },
          label: {
            show: true,
            position: val >= 0 ? 'top' : 'bottom', 
            formatter: val > 0 ? '+' + val.toFixed(1) : val.toFixed(1),
            fontSize: 11
          }
        };
      })
    }
  ]
};

    }
